name: The Automated Forge (CI)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Grant Execution Permission for Maven Wrapper
        run: chmod +x mvnw

      - name: Execute Build and Unit/Integration Tests
        run: ./mvnw clean verify

      - name: Upload JaCoCo Coverage Report
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: jacoco-coverage-reports
          path: '**/target/site/jacoco/index.html'
          retention-days: 7